<script>
  let products = [];
  let cart = [];

  async function loadProducts() {
    const status = document.getElementById('status');
    status.innerHTML = 'Завантаження каталогу...';

    try {
      // Новий проксі
      const sheetUrl = "https://docs.google.com/spreadsheets/d/15vBAsDOUfPz_WVTK1brfWIDAUDFoN88lJPMyDbUZaE8/export?format=csv&gid=0";
      const proxyUrl = "https://corsproxy.io/?" + encodeURIComponent(sheetUrl);
      
      const response = await fetch(proxyUrl);
      
      if (!response.ok) throw new Error("Проксі не відповідає");

      const text = await response.text();
      products = parseCSV(text);

      console.log("Завантажено товарів:", products.length);

      if (products.length > 10) {
        populateCategories();
        renderProducts();
        status.innerHTML = `✅ Завантажено ${products.length} товарів`;
      } else {
        status.innerHTML = "⚠️ Товарів завантажено мало. Спробуйте оновити сторінку.";
      }
    } catch (err) {
      console.error(err);
      status.innerHTML = `❌ Не вдалося завантажити дані.<br>
        <small>Спробуйте оновити сторінку (F5)</small>`;
    }
  }

  function parseCSV(text) {
    const lines = text.trim().split('\n');
    const result = [];
    let currentGroup = "";

    for (let i = 1; i < lines.length; i++) {
      let line = lines[i].trim();
      if (!line) continue;

      line = line.replace(/"([^"]*)"/g, m => m.replace(/,/g, '§'));
      const cells = line.split(',').map(c => c.replace(/§/g, ',').replace(/^"|"$/g, '').trim());

      if (cells[1] && cells[1].includes("ТМЦ /")) {
        currentGroup = cells[1].replace("ТМЦ /", "").trim();
        continue;
      }

      if (cells[2] && cells[2].length > 3) {
        let priceStr = (cells[4] || cells[3] || cells[cells.length-1] || "0")
          .replace(/[^0-9.,]/g, '').replace(',', '.');
        const price = parseFloat(priceStr) || 0;

        result.push({
          id: cells[1] || String(i),
          code: cells[1] || '',
          name: cells[2],
          price: price,
          group: currentGroup
        });
      }
    }
    return result;
  }

  // Інші функції (populateCategories, renderProducts, filterProducts, addToCart тощо) — залишаються ті самі

  function populateCategories() {
    const groups = [...new Set(products.map(p => p.group).filter(Boolean))].sort();
    const select = document.getElementById('category');
    groups.forEach(g => {
      const opt = document.createElement('option');
      opt.value = g;
      opt.textContent = g;
      select.appendChild(opt);
    });
  }

  function renderProducts(filtered = products) {
    const container = document.getElementById('products');
    container.innerHTML = '';

    filtered.forEach(p => {
      const card = document.createElement('div');
      card.className = "product-card bg-white rounded-3xl p-6 border border-gray-200";
      card.innerHTML = `
        <div class="text-xs text-gray-500 mb-1">${p.code}</div>
        <div class="font-medium leading-tight mb-4 min-h-[3.8rem]">${p.name}</div>
        <div class="flex justify-between items-center">
          <div class="text-2xl font-bold text-blue-700">${p.price} грн</div>
          <button onclick="addToCart('${p.id}')" class="bg-blue-600 hover:bg-blue-700 text-white px-5 py-2 rounded-2xl text-sm transition">
            + В кошик
          </button>
        </div>
      `;
      container.appendChild(card);
    });
  }

  function filterProducts() {
    const search = document.getElementById('search').value.toLowerCase();
    const category = document.getElementById('category').value;

    const filtered = products.filter(p => {
      const matchSearch = !search || 
        p.name.toLowerCase().includes(search) || 
        (p.code && p.code.includes(search));
      const matchCat = !category || p.group === category;
      return matchSearch && matchCat;
    });

    renderProducts(filtered);
  }

  function addToCart(id) {
    const p = products.find(x => x.id === id);
    if (p) alert(`✅ Додано:\n${p.name}\nЦіна: ${p.price} грн`);
  }

  function toggleCart() {
    alert("Кошик буде додано пізніше");
  }

  window.onload = loadProducts;
</script>
