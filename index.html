<!DOCTYPE html>
<html lang="uk">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Продукт Плюс — Оптовий магазин</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css">
  <style>
    body { font-family: system-ui, -apple-system, sans-serif; }
  </style>
</head>
<body class="bg-gray-50">

  <header class="bg-blue-700 text-white sticky top-0 z-50 shadow">
    <div class="max-w-7xl mx-auto px-4 py-4 flex justify-between items-center">
      <h1 class="text-3xl font-bold flex items-center gap-3">
        <i class="fas fa-store"></i> Продукт Плюс
      </h1>
      <button onclick="toggleCart()" class="flex items-center gap-2 bg-blue-600 hover:bg-blue-500 px-5 py-2 rounded-xl transition relative">
        <i class="fas fa-shopping-cart"></i>
        <span id="cart-count" class="absolute -top-2 -right-2 bg-red-500 text-white text-xs font-bold rounded-full h-5 w-5 flex items-center justify-center">0</span>
      </button>
    </div>
  </header>

  <div class="max-w-7xl mx-auto px-4 py-8">
    <div class="flex flex-col md:flex-row gap-4 mb-8">
      <input id="search" type="text" placeholder="🔍 Пошук по назві або коду..." 
             class="flex-1 px-5 py-4 rounded-2xl border border-gray-300 focus:outline-none focus:border-blue-500 text-lg">
      <select id="category" onchange="filterProducts()" 
              class="w-full md:w-72 px-5 py-4 rounded-2xl border border-gray-300 focus:outline-none focus:border-blue-500 text-lg">
        <option value="">Всі групи</option>
      </select>
    </div>

    <div id="products" class="space-y-3"></div>
  </div>

  <div id="status" class="text-center text-sm py-8 text-gray-500"></div>

  <!-- Кошик -->
  <div id="cart-modal" class="hidden fixed inset-0 bg-black/70 flex items-center justify-center z-50">
    <div class="bg-white rounded-3xl w-full max-w-2xl max-h-[90vh] overflow-hidden flex flex-col m-4">
      <div class="p-6 border-b flex justify-between items-center">
        <h2 class="text-2xl font-bold">Ваш кошик</h2>
        <button onclick="toggleCart()" class="text-3xl leading-none hover:text-gray-500">×</button>
      </div>
      <div id="cart-items" class="flex-1 overflow-auto p-6 space-y-4"></div>
      <div class="p-6 border-t">
        <div class="flex justify-between text-xl font-bold mb-6">
          <span>Разом:</span>
          <span id="cart-total">0 грн</span>
        </div>
        <button onclick="showOrderForm()" class="w-full bg-green-600 hover:bg-green-700 text-white py-4 rounded-2xl text-lg font-semibold">
          Оформити замовлення
        </button>
      </div>
    </div>
  </div>

  <!-- Форма замовлення -->
  <div id="order-modal" class="hidden fixed inset-0 bg-black/70 flex items-center justify-center z-[100]">
    <div class="bg-white rounded-3xl w-full max-w-lg p-8 m-4">
      <h2 class="text-2xl font-bold mb-6">Оформлення замовлення</h2>
      <form id="order-form" onsubmit="submitOrder(event)">
        <input type="text" id="client-name" placeholder="Назва клієнта (ФОП або магазин)" required
               class="w-full px-5 py-4 border rounded-2xl mb-4 focus:outline-none focus:border-blue-500">
        <textarea id="note" placeholder="Примітка до замовлення (необов'язково)" rows="4"
                  class="w-full px-5 py-4 border rounded-2xl mb-6 focus:outline-none focus:border-blue-500"></textarea>
        <div class="flex gap-4">
          <button type="button" onclick="hideOrderForm()" class="flex-1 py-4 border border-gray-300 rounded-2xl font-medium">Скасувати</button>
          <button type="submit" class="flex-1 py-4 bg-green-600 hover:bg-green-700 text-white rounded-2xl font-semibold">Відправити замовлення</button>
        </div>
      </form>
    </div>
  </div>

  <script>
    let products = [];
    let cart = [];

    async function init() {
      const status = document.getElementById('status');
      status.textContent = 'Завантаження каталогу...';

      try {
        const response = await fetch('https://corsproxy.io/?' + encodeURIComponent('https://docs.google.com/spreadsheets/d/15vBAsDOUfPz_WVTK1brfWIDAUDFoN88lJPMyDbUZaE8/export?format=csv'));
        const text = await response.text();
        products = parseCSV(text);

        status.textContent = `✅ Завантажено ${products.length} товарів`;
        populateCategories();
        renderProducts();
      } catch(e) {
        status.textContent = '❌ Помилка завантаження. Оновіть сторінку (F5)';
      }
    }

    function parseCSV(text) {
      const lines = text.trim().split('\n');
      const result = [];
      let currentGroup = "";

      for (let i = 1; i < lines.length; i++) {
        let line = lines[i].trim();
        if (!line) continue;

        line = line.replace(/"([^"]*)"/g, m => m.replace(/,/g, '§'));
        const cells = line.split(',').map(c => c.replace(/§/g, ',').replace(/^"|"$/g, '').trim());

        if (cells[1] && cells[1].includes("ТМЦ /")) {
          currentGroup = cells[1].replace("ТМЦ /", "").trim();
          continue;
        }

        if (cells[2]) {
          let priceStr = (cells[4] || cells[3] || "").replace(/[^0-9.,]/g, '').replace(',', '.');
          const price = parseFloat(priceStr) || 0;

          if (price > 0) {
            result.push({
              id: cells[1] || String(i),
              code: cells[1] || '',
              name: cells[2],
              price: price,
              group: currentGroup
            });
          }
        }
      }
      return result;
    }

    function populateCategories() {
      const groups = [...new Set(products.map(p => p.group).filter(Boolean))].sort();
      const select = document.getElementById('category');
      groups.forEach(g => {
        const opt = document.createElement('option');
        opt.value = g;
        opt.textContent = g;
        select.appendChild(opt);
      });
    }

    function renderProducts(filtered = products) {
      const container = document.getElementById('products');
      container.innerHTML = '';

      filtered.forEach(p => {
        const item = document.createElement('div');
        item.className = "bg-white border border-gray-200 rounded-2xl p-5 hover:border-blue-300 transition";
        item.innerHTML = `
          <div class="flex flex-col md:flex-row md:items-center gap-4">
            <div class="flex-1">
              <div class="flex items-center gap-2 text-sm text-gray-500">
                <span class="font-medium">Код:</span> 
                <span class="font-mono">${p.code}</span>
              </div>
              <div class="font-medium mt-1 text-lg leading-tight">${p.name}</div>
            </div>
            <div class="flex items-center gap-6">
              <div>
                <div class="text-sm text-gray-500">Ціна:</div>
                <div class="text-2xl font-bold text-blue-700">${p.price} грн</div>
              </div>
              <button onclick="addToCart('${p.id}')" class="bg-blue-600 hover:bg-blue-700 text-white px-6 py-3 rounded-2xl transition">
                <i class="fas fa-cart-plus"></i>
              </button>
            </div>
          </div>
        `;
        container.appendChild(item);
      });
    }

    function filterProducts() {
      const search = document.getElementById('search').value.toLowerCase().trim();
      const category = document.getElementById('category').value;

      const filtered = products.filter(p => {
        const matchSearch = !search || p.name.toLowerCase().includes(search) || p.code.toLowerCase().includes(search);
        const matchCat = !category || p.group === category;
        return matchSearch && matchCat;
      });

      renderProducts(filtered);
    }

    function addToCart(id) {
      const product = products.find(p => p.id === id);
      if (!product) return;

      const existing = cart.find(item => item.id === id);
      if (existing) existing.qty += 1;
      else cart.push({...product, qty: 1});

      updateCartCount();
    }

    function updateCartCount() {
      const count = cart.reduce((sum, item) => sum + item.qty, 0);
      document.getElementById('cart-count').textContent = count;
    }

    function toggleCart() {
      document.getElementById('cart-modal').classList.toggle('hidden');
      renderCart();
    }

    function renderCart() {
      const container = document.getElementById('cart-items');
      container.innerHTML = '';
      let total = 0;

      if (cart.length === 0) {
        container.innerHTML = `<p class="text-center text-gray-500 py-12">Кошик порожній</p>`;
        document.getElementById('cart-total').textContent = '0 грн';
        return;
      }

      cart.forEach((item, index) => {
        const sum = item.price * item.qty;
        total += sum;
        const div = document.createElement('div');
        div.className = "flex gap-4 bg-gray-50 p-4 rounded-2xl";
        div.innerHTML = `
          <div class="flex-1">
            <div class="font-medium">${item.name}</div>
            <div class="text-sm text-gray-500">${item.code} — ${item.price} грн</div>
          </div>
          <div class="flex items-center gap-3">
            <input type="number" value="${item.qty}" min="1" class="w-20 text-center border rounded-xl py-2" onchange="changeQty(${index}, this.value)">
            <button onclick="removeFromCart(${index})" class="text-red-500 hover:text-red-700">✕</button>
          </div>
          <div class="w-24 text-right font-semibold">${sum} грн</div>
        `;
        container.appendChild(div);
      });

      document.getElementById('cart-total').textContent = total + ' грн';
    }

    function changeQty(index, newQty) {
      cart[index].qty = parseInt(newQty) || 1;
      renderCart();
      updateCartCount();
    }

    function removeFromCart(index) {
      cart.splice(index, 1);
      renderCart();
      updateCartCount();
    }

    function showOrderForm() {
      if (cart.length === 0) return alert("Кошик порожній!");
      document.getElementById('cart-modal').classList.add('hidden');
      document.getElementById('order-modal').classList.remove('hidden');
    }

    function hideOrderForm() {
      document.getElementById('order-modal').classList.add('hidden');
    }

    async function submitOrder(e) {
  e.preventDefault();
  
  const clientName = document.getElementById('client-name').value.trim();
  if (!clientName) return alert("Введіть назву клієнта!");

  const note = document.getElementById('note').value.trim();

  let html = `
    <h2 style="color: #1e40af;">Нове замовлення</h2>
    <p><strong>Клієнт:</strong> ${clientName}</p>
    <p><strong>Дата:</strong> ${new Date().toLocaleString('uk-UA')}</p>
    <br>
    <table border="1" cellpadding="10" cellspacing="0" style="border-collapse: collapse; width: 100%; border: 1px solid #ccc; font-family: Arial, sans-serif;">
      <thead>
        <tr style="background-color: #e0f2fe;">
          <th style="text-align: left; padding: 10px;">Код</th>
          <th style="text-align: left; padding: 10px;">Назва товару</th>
          <th style="text-align: center; padding: 10px;">Кількість</th>
          <th style="text-align: right; padding: 10px;">Ціна за од.</th>
          <th style="text-align: right; padding: 10px;">Сума</th>
        </tr>
      </thead>
      <tbody>
  `;

  let total = 0;
  cart.forEach(item => {
    const sum = item.price * item.qty;
    total += sum;
    html += `
      <tr>
        <td style="padding: 10px;">${item.code}</td>
        <td style="padding: 10px;">${item.name}</td>
        <td style="text-align: center; padding: 10px;">${item.qty}</td>
        <td style="text-align: right; padding: 10px;">${item.price} грн</td>
        <td style="text-align: right; padding: 10px; font-weight: bold;">${sum} грн</td>
      </tr>
    `;
  });

  html += `
      </tbody>
    </table>
    <br>
    <p><strong style="font-size: 18px;">Всього до сплати: ${total} грн</strong></p>
  `;

  if (note) html += `<p><strong>Примітка:</strong> ${note}</p>`;

  const formData = new FormData();
  formData.append('message', html);
  formData.append('_subject', `Замовлення від ${clientName}`);
  formData.append('_html', 'true');   // ← Це важливо!

  try {
    await fetch('https://formspree.io/f/mlgqrbdw', {
      method: 'POST',
      body: formData,
      headers: { 'Accept': 'application/json' }
    });

    alert('✅ Замовлення успішно відправлено!');
    cart = [];
    updateCartCount();
    hideOrderForm();
    toggleCart();
  } catch (err) {
    alert('Помилка відправки. Спробуйте пізніше.');
  }
}

    window.onload = function() {
      init();
      document.getElementById('search').addEventListener('input', filterProducts);
    };
  </script>
</body>
</html>
